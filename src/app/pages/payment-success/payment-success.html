<div class="success-wrapper">

    <div class="success-card">

        <div class="success-icon">
            🎉
        </div>

        <h1>
            Request Submitted
        </h1>

        <p>
            Thank you for choosing Premium.
            Your payment screenshot and UTR
            have been received successfully.
        </p>

        <div class="status-box">

            <i class="fa-solid fa-clock"></i>

            <span>
                Waiting For Admin Verification
            </span>

        </div>

        <div class="info-box">

            <p>
                Once approved, your plan
                will be activated automatically.
            </p>

        </div>

        <button
            class="dashboard-btn"
            (click)="goToDashboard()">

            Go To Dashboard

        </button>

    </div>

</div>
