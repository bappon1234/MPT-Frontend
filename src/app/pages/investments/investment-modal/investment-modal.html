<div class="modal-overlay" (click)="closeModal()">

    <div class="investment-modal" (click)="$event.stopPropagation()">

        <div class="modal-header">

            <h2>
                {{ mode === 'holding' ? 'Add Holding' : 'Log Trade' }}
            </h2>

            <button type="button" class="close-btn" (click)="closeModal()">
                <i class="fa-solid fa-xmark"></i>
            </button>

        </div>

        <form (ngSubmit)="createInvestment()">

            <!-- HOLDING FORM -->
            <ng-container *ngIf="mode === 'holding'">

                <div class="form-group">
                    <label>Investment Name</label>
                    <input type="text" name="name" [(ngModel)]="formData.name" placeholder="Reliance, BTC, Gold..."
                        required>
                </div>

                <div class="form-group">
                    <label>Invested Amount</label>
                    <input type="number" name="invested" [(ngModel)]="formData.invested" placeholder="50000" required>
                </div>

                <div class="form-group">
                    <label>Current Value</label>
                    <input type="number" name="current" [(ngModel)]="formData.current" placeholder="55000" required>
                </div>

            </ng-container>

            <!-- TRADE FORM -->
            <ng-container *ngIf="mode === 'trade'">

                <div class="form-group">
                    <label>Trading Symbol</label>
                    <input type="text" name="name" [(ngModel)]="formData.name" placeholder="BTCUSDT" required>
                </div>

                <div class="form-group">
                    <label>Trade Type</label>

                    <select name="type" [(ngModel)]="formData.type" required>

                        <option value="">Select Type</option>
                        <option value="BUY">BUY</option>
                        <option value="SELL">SELL</option>

                    </select>
                </div>

                <div class="form-group">
                    <label>Entry Price</label>
                    <input type="number" name="entry" [(ngModel)]="formData.entry" placeholder="100" required>
                </div>

                <div class="form-group">
                    <label>Exit Price</label>
                    <input type="number" name="exit" [(ngModel)]="formData.exit" placeholder="120" required>
                </div>

                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="quantity" [(ngModel)]="formData.quantity" placeholder="10" required>
                </div>

                <div class="trade-preview" *ngIf="
                               formData.type &&
                               formData.entry &&
                               formData.exit &&
                               formData.quantity
                             ">

                    <span>
                        Estimated P&L ({{ formData.type }})
                    </span>

                    <h3 [class.profit]="calculatePnL() >= 0" [class.loss]="calculatePnL() < 0">

                        ₹{{ calculatePnL() | number:'1.0-2' }}

                    </h3>

                </div>

            </ng-container>

            <button type="submit" class="save-btn" [disabled]="loading">

                <span *ngIf="!loading">
                    {{ mode === 'holding' ? 'Add Investment' : 'Save Trade' }}
                </span>

                <span *ngIf="loading">
                    Saving...
                </span>

            </button>

        </form>

    </div>

</div>
